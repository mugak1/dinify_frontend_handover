<div *ngIf="details" class="w-full text-center">
    <p class="font-bold text-lg">Payment {{details?.transaction_status|titlecase}}</p>
    <p class="text-gray-400 text-sm mt-2"><span>Your payment of <span class="text-gray-500">UGX </span> <span class="text-black font-extrabold">{{details?.transaction_amount|number}}</span> paid <span *ngIf="details?.transaction_status==='successful'">was successfully received</span><span *ngIf="details?.transaction_status==='pending'||details?.transaction_status==='initiated'">is pending</span><span *ngIf="details?.transaction_status==='failed'">has failed</span></span> </p>
    <p class="mt-2 text-blue-500 underline text-sm">Continue with the Menu ></p>
</div>
<div *ngIf="details" class="bg-gray-200 w-full flex flex-col items-center mt-6">
    <div class="flex flex-col items-center py-6 space-y-3">
      <span class="text-lg text-gray-800">Rate your experience ?</span>
      <form class="star-rating">
        <input class="radio-input" [(ngModel)]="rating" type="radio" id="star5" name="star-input" value="5" />
        <label class="radio-label" for="star5" title="5 stars">5 stars</label>
      
        <input class="radio-input" [(ngModel)]="rating"  type="radio" id="star4" name="star-input" value="4" />
        <label class="radio-label" for="star4" title="4 stars">4 stars</label>
      
        <input class="radio-input" [(ngModel)]="rating"  type="radio" id="star3" name="star-input" value="3" />
        <label class="radio-label" for="star3" title="3 stars">3 stars</label>
      
        <input class="radio-input" [(ngModel)]="rating"  type="radio" id="star2" name="star-input" value="2" />
        <label class="radio-label" for="star2" title="2 stars">2 stars</label>
      
        <input class="radio-input" [(ngModel)]="rating"  type="radio" id="star1" name="star-input" value="1" />
        <label class="radio-label" for="star1" title="1 star">1 star</label>
      </form>
