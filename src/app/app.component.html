<div *ngFor='let message of messageService.messages' [ngClass]="{'bg-red-50 text-red-800':message.severity==='error','bg-green-50 text-green-800':message.severity==='info'}" id="alert-2" class="flex absolute items-center w-full lg:w-1/4 lg:right-[calc(75dvw/2)]  p-4 mb-4 z-[1000]  rounded-lg bg-red-50 mx-auto" role="alert">
    <svg class="flex-shrink-0 w-4 h-4"  xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
      <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
    </svg>
    <span class="sr-only">Info</span>
    <div class="ms-3 text-sm font-medium">
        {{message.message}}
      <!-- A simple info alert with an <a href="#" class="font-semibold underline hover:no-underline">example link</a>. Give it a click if you like. -->
    </div>
    <button type="button" (click)="messageService.clear()" [ngClass]="{'bg-red-50 text-red-500 focus:ring-red-400 hover:bg-red-200':message.severity==='error','bg-green-50 text-green-500 focus:ring-green-400 hover:bg-green-200':message.severity==='info'}" class="ms-auto -mx-1.5 -my-1.5 bg-red-50 rounded-lg focus:ring-2 p-1.5 inline-flex items-center justify-center h-8 w-8" data-dismiss-target="#alert-2" aria-label="Close">
      <span class="sr-only">Close</span>
      <svg class="w-3 h-3"  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
      </svg>
    </button>
  </div>
<router-outlet></router-outlet>

<ng-template #modalcontent>
</ng-template>
