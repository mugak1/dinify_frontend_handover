<app-dn-dialog [open]="open" (closed)="onClose()" maxWidth="md">
  @if (table) {
    <!-- Header -->
    <div class="flex items-center gap-2 mb-4">
      <h2 class="text-lg font-semibold">Table {{ table.number }} QR Code</h2>
      @if (area) {
        <app-dn-badge variant="secondary">{{ area.name }}</app-dn-badge>
      }
    </div>

    <!-- QR Code Display -->
    <div class="flex flex-col items-center py-6">
      <div
        #qrContainer
        class="bg-white p-6 rounded-xl shadow-sm border"
        [innerHTML]="qrSvgHtml"
      ></div>

      <!-- Table Info -->
      <div class="mt-4 text-center">
        <p class="text-sm text-muted-foreground">
          {{ table.maxCapacity }} seats &middot; {{ table.shape }}
        </p>
        <p class="text-xs text-muted-foreground mt-1 font-mono break-all">
          {{ qrUrl }}
        </p>
      </div>
    </div>

    <div class="border-t my-4"></div>

    <!-- Action Buttons 2x2 Grid -->
    <div class="grid grid-cols-2 gap-2">
      <button app-dn-button variant="outline" (click)="handleDownloadPNG()">
        <!-- Download icon -->
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
      <button app-dn-button variant="outline" (click)="handleDownloadSVG()">
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download SVG
      </button>
      <button app-dn-button variant="outline" (click)="handlePrint()">
        <!-- Printer icon -->
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button app-dn-button variant="outline" (click)="handleCopyLink()">
        <!-- Copy icon -->
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Link
      </button>
    </div>

    <!-- Bottom Row -->
    <div class="flex gap-2 mt-2">
      <button app-dn-button variant="secondary" class="flex-1" (click)="handleOpenLink()">
        <!-- External link icon -->
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open Menu Link
      </button>
      <button app-dn-button variant="outline" (click)="handleRegenerate()">
        <!-- Refresh icon -->
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
  }
</app-dn-dialog>
