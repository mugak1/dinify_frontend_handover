<div class="space-y-4">
  <!-- Service Toolbar -->
  <app-service-toolbar
    [filters]="filters"
    [areas]="areas"
    [servers]="servers"
    [metrics]="metrics"
    (filtersChange)="onFiltersChange($event)"
  ></app-service-toolbar>

  <!-- Two-column layout -->
  <div class="flex flex-col lg:flex-row gap-4">
    <!-- Left pane: Reservations -->
    <div class="w-full lg:min-w-[400px] lg:max-w-[420px] lg:shrink-0 max-h-[35vh] sm:max-h-[40vh] lg:max-h-none overflow-y-auto lg:overflow-y-visible">
      <app-reservations-pane
        [reservations]="reservations"
        [waitlist]="waitlist"
        [seatedParties]="seatedParties"
        [tables]="tables"
        [areas]="areas"
        [servers]="servers"
        (newReservation)="onNewReservation()"
        (seatReservation)="onSeatReservation($event)"
        (viewTable)="onViewTable($event)"
        (editReservation)="onEditReservation($event)"
        (cancelReservation)="onCancelReservation($event)"
        (markNoShow)="onMarkNoShow($event)"
        (seatFromWaitlist)="onSeatFromWaitlist($event)"
      ></app-reservations-pane>
    </div>

    <!-- Right pane: Floor Plan Canvas -->
    <div class="relative flex-1 min-w-0">
      <app-floor-plan-canvas
        [tables]="filteredTables"
        [areas]="areas"
        [seatedParties]="seatedParties"
        [servers]="servers"
        [selectedTableId]="selectedTableId"
        [selectedTableIds]="selectedTableIds"
        [reservations]="reservations"
        (tableSelect)="onTableSelect($event)"
        (seatReservation)="onSeatReservation($event)"
        (tablesChange)="onTablesChange($event)"
      ></app-floor-plan-canvas>
    </div>
  </div>
</div>

<!-- New Reservation Modal -->
<app-new-reservation-modal
  [open]="isNewReservationModalOpen"
  [areas]="areas"
  (closed)="isNewReservationModalOpen = false"
  (saved)="onNewReservationSaved($event)"
></app-new-reservation-modal>

<!-- Table Details Drawer -->
<app-table-details-drawer
  [isOpen]="isDrawerOpen"
  [tableId]="selectedTableId"
  [tableIds]="selectedTableIds"
  [tables]="tables"
  [areas]="areas"
  [servers]="servers"
  [seatedParties]="seatedParties"
  [reservations]="reservations"
  (closed)="onCloseDrawer()"
  (markStatus)="onMarkStatus($event)"
  (seatWalkIn)="onSeatWalkIn($event)"
  (transfer)="onTransfer($event)"
  (markPaid)="onMarkPaid($event)"
  (offSystemPay)="onOffSystemPay($event)"
  (addToWaitlist)="onDrawerAddToWaitlist($event)"
  (changeServer)="onChangeServer($event)"
  (addNote)="onAddNote($event)"
  (mergeTables)="onMergeTables($event)"
></app-table-details-drawer>

<!-- Transfer Party Modal -->
<app-transfer-table-modal
  [open]="!!transferSourceTableId"
  [sourceTable]="transferSourceTable"
  [party]="transferSourceParty"
  [tables]="tables"
  [areas]="areas"
  (closed)="onTransferClose()"
  (transferred)="onTransferComplete($event)"
></app-transfer-table-modal>
