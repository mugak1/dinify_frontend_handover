<!-- Approval bar -->
<div *ngIf="isThirdChild && (auth.currentRestaurant?.first_time_menu_approval_decision === 'submit' || restaurantProfile?.first_time_menu_approval_decision === 'submit' || auth.currentRestaurant?.first_time_menu_approval_decision === 'pending' || restaurantProfile?.first_time_menu_approval_decision === 'pending')"
     class="flex items-center gap-2 px-4 py-2 border-b border-border bg-card">
  <button *ngIf="(auth.currentRestaurantRole?.roles?.includes('owner') || auth.userValue?.profile?.roles?.includes('dinify_admin')) && (auth.currentRestaurant?.first_time_menu_approval_decision === 'submit' || restaurantProfile?.first_time_menu_approval_decision === 'submit')"
          (click)="approveMenu('approve')"
          class="ml-auto inline-flex items-center rounded-md border border-primary text-primary px-4 py-1.5 text-sm font-medium hover:bg-primary hover:text-primary-foreground transition-colors">
    Approve Menu
  </button>
  <button *ngIf="(auth.currentRestaurantRole?.roles?.includes('manager') || auth.currentRestaurantRole?.roles?.includes('owner') || auth.userValue?.profile?.roles?.includes('dinify_admin')) && (auth.currentRestaurant?.first_time_menu_approval_decision === 'pending' || restaurantProfile?.first_time_menu_approval_decision === 'pending')"
          (click)="approveMenu('submit')"
          class="ml-auto inline-flex items-center rounded-md border border-primary text-primary px-4 py-1.5 text-sm font-medium hover:bg-primary hover:text-primary-foreground transition-colors">
    Submit Menu
  </button>
</div>

<!-- Tab navigation -->
<div class="border-b border-border bg-card px-4 pt-3">
  <app-dn-tabs [value]="activeTab" (valueChange)="activeTab = $any($event)">
    <app-dn-tab-list>
      <app-dn-tab-trigger value="sections">Menu Sections</app-dn-tab-trigger>
      <app-dn-tab-trigger value="upsells">Upsells</app-dn-tab-trigger>
    </app-dn-tab-list>
  </app-dn-tabs>
</div>

<!-- Main layout -->
<div class="flex flex-col flex-1 overflow-hidden" style="height: calc(100dvh - 8rem);">

  <!-- Sections tab content -->
  <div *ngIf="activeTab === 'sections'" class="flex flex-col md:flex-row flex-1 overflow-hidden">

    <!-- Section Rail (left sidebar, hidden on mobile) -->
    <app-section-rail
      (newSection)="openSectionForm()"
      (editSection)="openSectionForm($event)"
      (deleteSection)="confirmDeleteSection($event)"
      (newItem)="openItemForm()">
    </app-section-rail>

    <!-- Main content area -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">

      <!-- Toolbar -->
      <div class="border-b border-border p-3 md:p-4 flex items-center justify-between gap-2 bg-card">

        <!-- Mobile section selector (visible below md) -->
        <div class="md:hidden flex-1">
          <select (change)="onMobileSectionChange($any($event).target.value)"
                  class="w-full border border-input bg-background text-foreground rounded-md px-3 py-2.5 text-sm">
            <option *ngFor="let s of sections$ | async"
                    [value]="s.id"
                    [selected]="(selectedSectionId$ | async) === s.id">
              {{ s.name }} ({{ s.item_count || 0 }})
            </option>
          </select>
        </div>

        <!-- Desktop section name (hidden on mobile) -->
        <ng-container *ngIf="sections$ | async as allSections">
          <ng-container *ngIf="selectedSectionId$ | async as selId">
            <h2 *ngFor="let sec of allSections"
                class="hidden md:block text-xl font-semibold text-foreground">
              <span *ngIf="sec.id === selId">{{ sec.name }}</span>
            </h2>
          </ng-container>
        </ng-container>

        <div class="flex items-center gap-2">
          <!-- Sort dropdown -->
          <select [ngModel]="sortMode"
                  (ngModelChange)="onSortModeChange($event)"
                  class="border border-input bg-background text-foreground rounded-md px-3 py-2 text-sm">
            <option value="manual">Manual</option>
            <option value="a-z">A–Z</option>
            <option value="price-low">Price ↑</option>
            <option value="price-high">Price ↓</option>
          </select>

          <!-- Tags button -->
          <button (click)="presetTagsOpen = true"
                  class="inline-flex items-center gap-1 border border-input rounded-md px-4 py-2 text-sm text-muted-foreground hover:bg-accent transition-colors"
                  title="Manage Tags">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/>
              <circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/>
            </svg>
            <span class="hidden sm:inline">Tags</span>
          </button>

          <!-- Search button -->
          <button (click)="searchOpen = true"
                  class="inline-flex items-center gap-1 border border-input rounded-md px-4 py-2 text-sm text-muted-foreground hover:bg-accent transition-colors"
                  title="Search (Ctrl+K)">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span class="hidden sm:inline">Search</span>
          </button>
        </div>
      </div>

      <!-- Items grid -->
      <app-item-list
        (editItem)="openItemForm($event)"
        (deleteItem)="confirmDeleteItem($event)"
        (newItem)="openItemForm()">
      </app-item-list>
    </div>
  </div>

  <!-- Upsells tab content -->
  <app-upsells-tab *ngIf="activeTab === 'upsells'" class="flex-1 overflow-y-auto"></app-upsells-tab>
</div>

<!-- Section form dialog (create / edit) -->
<app-section-form-dialog
  [open]="sectionFormOpen"
  [section]="editingSection"
  [restaurantId]="restaurant"
  (closed)="closeSectionForm()"
  (saved)="onSectionSaved($event)">
</app-section-form-dialog>

<!-- Section delete dialog -->
<app-section-form-dialog
  [open]="sectionDeleteOpen"
  [deleteMode]="true"
  [section]="editingSection"
  [restaurantId]="restaurant"
  (closed)="closeSectionDelete()"
  (deleted)="onSectionDeleted($event)">
</app-section-form-dialog>

<!-- Item form dialog (create / edit) -->
<app-item-form-dialog
  [open]="itemFormOpen"
  [item]="editingItem"
  [sectionId]="(selectedSectionId$ | async) ?? undefined"
  (closed)="closeItemForm()"
  (saved)="onItemSaved($event)">
</app-item-form-dialog>

<!-- Search overlay -->
<app-menu-search
  [open]="searchOpen"
  (closed)="searchOpen = false">
</app-menu-search>

<!-- Preset tags config dialog -->
<app-preset-tags-config
  [open]="presetTagsOpen"
  [restaurantId]="restaurant"
  (closed)="presetTagsOpen = false">
</app-preset-tags-config>
