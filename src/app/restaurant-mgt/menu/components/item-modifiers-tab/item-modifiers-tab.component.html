<div class="space-y-4 py-2">

  <!-- Legacy format warning -->
  <div *ngIf="isLegacy"
       class="flex items-center gap-2 rounded-md border border-warning bg-warning/10 px-4 py-3 text-sm text-warning">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
      <path d="M12 9v4"/><path d="M12 17h.01"/>
    </svg>
    Legacy format detected &mdash; save to upgrade
  </div>

  <!-- Main toggle -->
  <div class="flex items-center gap-2">
    <app-dn-switch
      [checked]="hasModifiers"
      (checkedChange)="onToggleModifiers($event)">
    </app-dn-switch>
    <span class="text-sm font-medium text-foreground">Has Modifiers</span>
  </div>

  <!-- Modifier groups -->
  <ng-container *ngIf="hasModifiers">

    <div cdkDropList
         (cdkDropListDropped)="onGroupDrop($event)"
         class="space-y-3">

      <div *ngFor="let group of groups; let gi = index; trackBy: trackGroupById"
           cdkDrag
           class="rounded-lg border border-border bg-card">

        <!-- Group header -->
        <div class="flex items-center gap-2 px-4 py-3 cursor-pointer select-none"
             (click)="toggleExpand(group.id)">
          <!-- Drag handle -->
          <div cdkDragHandle class="cursor-grab text-muted-foreground hover:text-foreground"
               (click)="$event.stopPropagation()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/>
              <circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>
            </svg>
          </div>

          <!-- Expand chevron -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-muted-foreground transition-transform"
               [class.rotate-90]="isExpanded(group.id)"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6"/>
          </svg>

          <span class="flex-1 text-sm font-medium text-foreground truncate">
            {{ group.name || 'Untitled Group' }}
          </span>

          <span *ngIf="group.required"
                class="text-xs bg-primary/10 text-primary px-1.5 py-0.5 rounded">
            Required
          </span>

          <span class="text-xs text-muted-foreground">
            {{ group.choices.length }} choice{{ group.choices.length !== 1 ? 's' : '' }}
          </span>

          <!-- Remove group -->
          <button type="button"
                  class="text-muted-foreground hover:text-destructive p-1 rounded"
                  (click)="removeGroup(gi); $event.stopPropagation()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
          </button>
        </div>

        <!-- Group body (collapsible) -->
        <div *ngIf="isExpanded(group.id)" class="border-t border-border px-4 py-4 space-y-3">

          <!-- Group name -->
          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1">Group Name</label>
            <input type="text"
                   [(ngModel)]="group.name"
                   (ngModelChange)="emitChange()"
                   placeholder="e.g. Choose your size"
                   class="w-full border border-input bg-background text-foreground rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring" />
          </div>

          <!-- Required + Selection type row -->
          <div class="flex flex-wrap items-center gap-4">
            <div class="flex items-center gap-2">
              <app-dn-switch
                [checked]="group.required"
                (checkedChange)="onRequiredChange(group, $event)">
              </app-dn-switch>
              <span class="text-sm text-foreground">Required</span>
            </div>

            <div>
              <label class="block text-xs font-medium text-muted-foreground mb-1">Selection Type</label>
              <select [ngModel]="group.selectionType"
                      (ngModelChange)="onSelectionTypeChange(group, $event)"
                      class="border border-input bg-background text-foreground rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring">
                <option value="single">Single choice</option>
                <option value="multiple">Multiple choices</option>
              </select>
            </div>

            <div class="flex items-center gap-2">
              <div>
                <label class="block text-xs font-medium text-muted-foreground mb-1">Min</label>
                <input type="number"
                       [(ngModel)]="group.minSelections"
                       (ngModelChange)="emitChange()"
                       min="0"
                       class="w-20 border border-input bg-background text-foreground rounded-md px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring" />
              </div>
              <div>
                <label class="block text-xs font-medium text-muted-foreground mb-1">Max</label>
                <input type="number"
                       [(ngModel)]="group.maxSelections"
                       (ngModelChange)="emitChange()"
                       min="1"
                       class="w-20 border border-input bg-background text-foreground rounded-md px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring" />
              </div>
            </div>
          </div>

          <!-- Choices -->
          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1">Choices</label>

            <!-- Validation warning -->
            <div *ngIf="group.required && group.choices.length === 0"
                 class="text-xs text-destructive mb-2">
              Required group must have at least one choice.
            </div>

            <div cdkDropList
                 [cdkDropListData]="group.choices"
                 (cdkDropListDropped)="onChoiceDrop(group, $event)"
                 class="space-y-2">

              <div *ngFor="let choice of group.choices; let ci = index; trackBy: trackChoiceById"
                   cdkDrag
                   class="flex items-center gap-2 rounded-md border border-border bg-background px-3 py-2">

                <!-- Choice drag handle -->
                <div cdkDragHandle class="cursor-grab text-muted-foreground hover:text-foreground">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/>
                    <circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>
                  </svg>
                </div>

                <!-- Choice name -->
                <input type="text"
                       [(ngModel)]="choice.name"
                       (ngModelChange)="emitChange()"
                       placeholder="Choice name"
                       class="flex-1 min-w-0 border border-input bg-background text-foreground rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring" />

                <!-- Additional cost -->
                <div class="flex items-center gap-1">
                  <span class="text-xs text-muted-foreground">UGX</span>
                  <input type="number"
                         [(ngModel)]="choice.additionalCost"
                         (ngModelChange)="emitChange()"
                         min="0"
                         placeholder="0"
                         class="w-24 border border-input bg-background text-foreground rounded-md px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring" />
                </div>

                <!-- Available toggle -->
                <app-dn-switch
                  [checked]="choice.available"
                  (checkedChange)="choice.available = $event; emitChange()">
                </app-dn-switch>

                <!-- Remove choice -->
                <button type="button"
                        class="text-muted-foreground hover:text-destructive p-0.5 rounded"
                        (click)="removeChoice(group, ci)">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Add choice button -->
            <button type="button"
                    class="mt-2 text-sm text-primary hover:text-primary/80 flex items-center gap-1"
                    (click)="addChoice(group)">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/><path d="M12 5v14"/>
              </svg>
              Add Choice
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add group button -->
    <button type="button" app-dn-button variant="outline" class="w-full" (click)="addGroup()">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M12 5v14"/>
      </svg>
      Add Modifier Group
    </button>

    <!-- Empty state -->
    <p *ngIf="groups.length === 0"
       class="text-sm text-muted-foreground text-center py-4">
      No modifier groups yet. Add one to get started.
    </p>

  </ng-container>
</div>
