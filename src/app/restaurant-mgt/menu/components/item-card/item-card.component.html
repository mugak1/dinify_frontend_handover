<div class="rounded-lg border bg-card transition-all cursor-pointer"
     [class.opacity-50]="!item.available && !selectionMode"
     [class.grayscale]="!item.available && !selectionMode"
     [class.border-primary]="isSelected"
     [class.ring-2]="isSelected"
     [class.ring-primary]="isSelected"
     [class.border-border]="!isSelected"
     (click)="onCardClick()">

  <!-- Image area -->
  <div class="relative h-44 bg-muted overflow-hidden rounded-t-lg">
    <img *ngIf="imageUrl"
         [src]="imageUrl"
         [alt]="item.name"
         class="w-full h-full object-cover"
         loading="lazy">
    <div *ngIf="!imageUrl"
         class="w-full h-full flex items-center justify-center text-muted-foreground">
      <!-- Utensils placeholder icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/>
        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
      </svg>
    </div>

    <!-- Selection checkbox -->
    <div *ngIf="selectionMode"
         class="absolute top-2 left-2 z-10">
      <div class="h-6 w-6 rounded border-2 flex items-center justify-center transition-colors"
           [class.bg-primary]="isSelected"
           [class.border-primary]="isSelected"
           [class.bg-background/80]="!isSelected"
           [class.border-input]="!isSelected">
        <svg *ngIf="isSelected" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-primary-foreground"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      </div>
    </div>

    <!-- Discount badge -->
    <app-dn-badge *ngIf="hasDiscount && !selectionMode" variant="warning" class="absolute top-2 left-2">
      Discount
    </app-dn-badge>

    <!-- Drag handle overlay -->
    <div *ngIf="showDragHandle" cdkDragHandle
         class="absolute top-2 right-2 cursor-grab p-1 rounded bg-background/80 text-muted-foreground">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/>
        <circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div class="p-4">
    <h3 class="text-base font-semibold text-foreground truncate" [title]="item.name">{{ item.name }}</h3>
    <!-- Badge indicator pills -->
    <div class="flex flex-wrap gap-1 mt-1" *ngIf="item.is_featured || item.is_popular || item.is_new">
      <span *ngIf="item.is_featured"
            class="inline-flex items-center gap-0.5 bg-amber-500 text-white px-1.5 py-0.5 rounded text-[10px] font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 fill-current" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Featured
      </span>
      <span *ngIf="item.is_popular"
            class="inline-flex items-center gap-0.5 bg-orange-500 text-white px-1.5 py-0.5 rounded text-[10px] font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
        </svg>
        Popular
      </span>
      <span *ngIf="item.is_new"
            class="inline-flex items-center gap-0.5 bg-green-500 text-white px-1.5 py-0.5 rounded text-[10px] font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
        </svg>
        New
      </span>
    </div>
    <p class="text-sm text-muted-foreground line-clamp-2 mt-1">{{ item.description }}</p>
    <span class="text-base font-semibold text-primary mt-2 block">UGX {{ item.primary_price | number }}</span>
  </div>

  <!-- Actions footer -->
  <div class="px-4 pb-4 flex items-center justify-between" (click)="$event.stopPropagation()">
    <app-dn-switch
      [checked]="item.available"
      (checkedChange)="toggleAvailability.emit({ id: item.id, available: $event })">
    </app-dn-switch>
    <div class="flex items-center gap-1">
      <!-- Featured toggle -->
      <button app-dn-button
              [variant]="item.is_featured ? 'default' : 'ghost'"
              size="icon"
              class="h-8 w-8"
              [class.bg-amber-500]="item.is_featured"
              [class.hover:bg-amber-600]="item.is_featured"
              [class.text-white]="item.is_featured"
              [class.text-muted-foreground]="!item.is_featured"
              [appTooltip]="item.is_featured ? 'Remove from featured' : 'Mark as Featured'"
              (click)="toggleFeatured.emit({ id: item.id, is_featured: !item.is_featured })">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             [class.fill-current]="item.is_featured">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </button>
      <!-- Popular toggle -->
      <button app-dn-button
              [variant]="item.is_popular ? 'default' : 'ghost'"
              size="icon"
              class="h-8 w-8"
              [class.bg-orange-500]="item.is_popular"
              [class.hover:bg-orange-600]="item.is_popular"
              [class.text-white]="item.is_popular"
              [class.text-muted-foreground]="!item.is_popular"
              [appTooltip]="item.is_popular ? 'Remove popular badge' : 'Mark as Popular'"
              (click)="togglePopular.emit({ id: item.id, is_popular: !item.is_popular })">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             [class.fill-current]="item.is_popular">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
        </svg>
      </button>
      <!-- New toggle -->
      <button app-dn-button
              [variant]="item.is_new ? 'default' : 'ghost'"
              size="icon"
              class="h-8 w-8"
              [class.bg-green-500]="item.is_new"
              [class.hover:bg-green-600]="item.is_new"
              [class.text-white]="item.is_new"
              [class.text-muted-foreground]="!item.is_new"
              [appTooltip]="item.is_new ? 'Remove New badge' : 'Mark as New'"
              (click)="toggleNew.emit({ id: item.id, is_new: !item.is_new })">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             [class.fill-current]="item.is_new">
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
        </svg>
      </button>
      <!-- Divider -->
      <div class="w-px h-5 bg-border mx-0.5"></div>
      <!-- Pencil icon -->
      <button app-dn-button variant="ghost" size="icon" class="h-8 w-8" [appTooltip]="'Edit item'" (click)="edit.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
          <path d="m15 5 4 4"/>
        </svg>
      </button>
      <!-- Trash icon -->
      <button app-dn-button variant="ghost" size="icon" class="h-8 w-8 text-destructive" [appTooltip]="'Delete item'" (click)="delete.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          <line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
        </svg>
      </button>
    </div>
  </div>
</div>
