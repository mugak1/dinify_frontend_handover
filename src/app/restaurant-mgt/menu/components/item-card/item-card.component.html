<div class="border rounded-lg p-3 md:p-4 bg-card hover:shadow-md transition-shadow cursor-pointer"
     [class.opacity-60]="!item.available && !selectionMode"
     [class.ring-2]="isSelected"
     [class.ring-primary]="isSelected"
     [class.bg-primary/5]="isSelected"
     (click)="onCardClick()">

  <div class="flex gap-3 md:gap-4">

    <!-- Selection checkbox -->
    <div *ngIf="selectionMode"
         class="flex items-center flex-shrink-0"
         (click)="$event.stopPropagation(); toggleSelect.emit()">
      <div class="h-6 w-6 rounded border-2 flex items-center justify-center transition-colors"
           [class.bg-primary]="isSelected"
           [class.border-primary]="isSelected"
           [class.bg-background]="!isSelected"
           [class.border-input]="!isSelected">
        <svg *ngIf="isSelected" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-primary-foreground"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      </div>
    </div>

    <!-- Drag handle -->
    <div *ngIf="showDragHandle && !selectionMode" cdkDragHandle
         class="flex items-center cursor-grab active:cursor-grabbing text-muted-foreground hover:text-foreground flex-shrink-0"
         (click)="$event.stopPropagation()">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/>
        <circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/>
      </svg>
    </div>

    <!-- Thumbnail -->
    <div class="w-16 h-16 md:w-24 md:h-24 rounded-md bg-muted flex-shrink-0 overflow-hidden">
      <img *ngIf="imageUrl"
           [src]="imageUrl"
           [alt]="item.name"
           class="w-full h-full object-cover"
           loading="lazy">
      <div *ngIf="!imageUrl"
           class="w-full h-full flex items-center justify-center text-muted-foreground text-xs">
        No image
      </div>
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0">

      <!-- Row 1: Name + badges + action buttons -->
      <div class="flex items-start justify-between gap-2 mb-1">

        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <h3 class="font-semibold text-base md:text-lg truncate" [title]="item.name">{{ item.name }}</h3>

            <!-- Featured badge pill -->
            <span *ngIf="item.is_featured"
                  class="text-xs bg-amber-500 text-white px-2 py-0.5 rounded flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 fill-current" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              Featured
            </span>

            <!-- Popular badge pill -->
            <span *ngIf="item.is_popular"
                  class="text-xs bg-orange-500 text-white px-2 py-0.5 rounded flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 fill-current" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
              </svg>
              Popular
            </span>

            <!-- New badge pill -->
            <span *ngIf="item.is_new"
                  class="text-xs bg-green-500 text-white px-2 py-0.5 rounded flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
              </svg>
              New
            </span>

            <!-- Discount badge -->
            <app-dn-badge *ngIf="hasDiscount" variant="warning" class="text-xs">Discount</app-dn-badge>
          </div>

          <p *ngIf="item.description"
             class="text-sm text-muted-foreground line-clamp-2 mt-0.5">{{ item.description }}</p>
        </div>

        <!-- Right-side inline actions -->
        <div class="flex items-center gap-1 flex-shrink-0" (click)="$event.stopPropagation()">

          <!-- Featured toggle -->
          <button app-dn-button
                  [variant]="item.is_featured ? 'default' : 'ghost'"
                  size="icon"
                  class="h-8 w-8"
                  [class.bg-amber-500]="item.is_featured"
                  [class.hover:bg-amber-600]="item.is_featured"
                  [class.text-white]="item.is_featured"
                  [class.text-muted-foreground]="!item.is_featured"
                  [appTooltip]="item.is_featured ? 'Remove from featured' : 'Mark as Featured'"
                  (click)="toggleFeatured.emit({ id: item.id, is_featured: !item.is_featured })">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 [class.fill-current]="item.is_featured">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </button>

          <!-- Popular toggle -->
          <button app-dn-button
                  [variant]="item.is_popular ? 'default' : 'ghost'"
                  size="icon"
                  class="h-8 w-8"
                  [class.bg-orange-500]="item.is_popular"
                  [class.hover:bg-orange-600]="item.is_popular"
                  [class.text-white]="item.is_popular"
                  [class.text-muted-foreground]="!item.is_popular"
                  [appTooltip]="item.is_popular ? 'Remove popular badge' : 'Mark as Popular'"
                  (click)="togglePopular.emit({ id: item.id, is_popular: !item.is_popular })">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 [class.fill-current]="item.is_popular">
              <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
            </svg>
          </button>

          <!-- New toggle -->
          <button app-dn-button
                  [variant]="item.is_new ? 'default' : 'ghost'"
                  size="icon"
                  class="h-8 w-8"
                  [class.bg-green-500]="item.is_new"
                  [class.hover:bg-green-600]="item.is_new"
                  [class.text-white]="item.is_new"
                  [class.text-muted-foreground]="!item.is_new"
                  [appTooltip]="item.is_new ? 'Remove New badge' : 'Mark as New'"
                  (click)="toggleNew.emit({ id: item.id, is_new: !item.is_new })">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 [class.fill-current]="item.is_new">
              <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
              <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
            </svg>
          </button>

          <!-- Stock status pill -->
          <button app-dn-button
                  [variant]="item.available ? 'outline' : 'destructive'"
                  size="default"
                  class="h-8 gap-1.5 text-xs"
                  [appTooltip]="item.available ? 'In stock' : 'Out of stock'">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16.5 9.4 7.55 4.24"/>
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              <path d="m3.3 7 8.7 5 8.7-5"/>
              <path d="M12 22V12"/>
            </svg>
            <span class="hidden lg:inline">{{ item.available ? 'In stock' : 'Out' }}</span>
          </button>

          <!-- Edit -->
          <button app-dn-button variant="ghost" size="icon" class="h-8 w-8"
                  [appTooltip]="'Edit item'"
                  (click)="edit.emit()">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
              <path d="m15 5 4 4"/>
            </svg>
          </button>

          <!-- Availability switch -->
          <app-dn-switch
            [checked]="item.available"
            (checkedChange)="toggleAvailability.emit({ id: item.id, available: $event })">
          </app-dn-switch>

          <!-- Delete -->
          <button app-dn-button variant="ghost" size="icon" class="h-8 w-8 text-destructive"
                  [appTooltip]="'Delete item'"
                  (click)="delete.emit()">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
              <line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Row 2: Price -->
      <div class="flex items-center gap-2 mt-1">
        <span class="text-base md:text-lg font-bold text-primary">
          UGX {{ item.primary_price | number }}
        </span>
      </div>

      <!-- Row 3: Allergens (only if present) -->
      <div *ngIf="item.allergens && item.allergens.length > 0"
           class="flex flex-wrap gap-1 mt-2">
        <app-dn-badge *ngFor="let allergen of item.allergens" variant="secondary" class="text-xs">
          {{ allergen }}
        </app-dn-badge>
      </div>
    </div>
  </div>
</div>
