<app-dn-dialog [open]="open" maxWidth="lg" (closed)="onClose()">

  <h2 class="text-xl font-semibold text-foreground mb-1">Preview</h2>
  <p class="text-sm text-muted-foreground mb-4">
    This is how the upsell carousel will appear to customers at checkout
  </p>

  <!-- Preview container -->
  <div class="border-2 border-dashed border-border rounded-lg p-6 bg-muted/30">

    <!-- Carousel title -->
    <h3 class="text-lg font-semibold text-foreground mb-4">{{ title }}</h3>

    <!-- Scrollable items row -->
    <div class="flex gap-3 overflow-x-auto pb-2">
      <div *ngFor="let item of items"
           class="w-32 flex-shrink-0 bg-card rounded-lg border border-border overflow-hidden shadow-sm">

        <!-- Image -->
        <div class="aspect-square bg-muted relative">
          <img *ngIf="getImageUrl(item)"
               [src]="getImageUrl(item)"
               [alt]="item.name"
               class="w-full h-full object-cover" />
          <div *ngIf="!getImageUrl(item)"
               class="w-full h-full flex items-center justify-center text-muted-foreground">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
              <circle cx="9" cy="9" r="2"/>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
            </svg>
          </div>
        </div>

        <!-- Info -->
        <div class="p-2">
          <p class="text-xs font-medium text-foreground line-clamp-2 mb-1">{{ item.name }}</p>
          <p class="text-xs text-muted-foreground mb-2">{{ item.primary_price | number:'1.0-0' }} UGX</p>
          <button class="w-full text-xs font-medium bg-primary text-primary-foreground rounded px-2 py-1.5 hover:bg-primary/90 transition-colors">
            ADD
          </button>
        </div>
      </div>

      <!-- Scroll indicator when many items -->
      <div *ngIf="items.length > 4"
           class="flex-shrink-0 w-8 flex items-center justify-center text-muted-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Close button -->
  <div class="flex justify-end mt-4">
    <button app-dn-button variant="outline" (click)="onClose()">Close</button>
  </div>

</app-dn-dialog>
