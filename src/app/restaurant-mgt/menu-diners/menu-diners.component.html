<div *ngIf="section_list" class="flex px-6 border-b border-gray-200">
    <div *ngFor="let s of section_list" [ngClass]="{'border-b-2 border-d-red':section?.id===s?.id}" class="flex items-center justify-between w-full py-2 font-medium text-left rtl:text-right text-gray-500">
       {{s?.name}}
    </div>
</div>
<div *ngIf="section_list" class="flex px-6">
    <div *ngFor="let g of group_menu_keys;let gi=index" class="flex text-sm items-center justify-between w-full py-2 font-bold text-left rtl:text-right text-gray-500 border-b border-gray-200">
        {{grouped_groups[g]?.name}}
    </div>
</div>
<div *ngIf="section_list" class="flex flex-col px-6 h-[400px] overflow-auto">
    <div *ngFor="let g of group_menu_keys;let gi=index"  class="flex flex-col justify-between w-full py-3 font-medium text-left rtl:text-right text-black">
       <span class="font-bold">{{grouped_groups[g]?.name}}</span>
       <div class="flex flex-col">
        <div *ngFor="let i of grouped_menu[g]"  class="py-4 border-b border-gray-200">
            <div class="flex flex-row">
                <div class="w-[140px]">
                 <app-common-image [src]="i.image" [width]="'100'" [height]="'100'"></app-common-image>     
                </div>
                <div  class="p-2 flex-grow">
                    <p>{{i.name}} </p>
                     <p class="text-sm">{{i.description}}</p>
                     <p><strong>UGX {{i.primary_price|number}}</strong></p>
