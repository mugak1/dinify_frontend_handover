<div class="space-y-4 sm:space-y-6">
  <h1 class="text-2xl sm:text-3xl font-bold text-foreground">Dashboard</h1>

  <!-- Row 1: Revenue (large) + Payment Methods (compact) -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
    <div class="lg:col-span-2">
      <app-revenue-card
        [revenueData]="dashboardData?.revenue ?? null"
        [dateRange]="(dashboardService.dateRange$ | async) ?? 'day'"
        [loading]="loading"
        [error]="error"
        (retry)="retryDashboard()"
      ></app-revenue-card>
    </div>
    <app-payment-methods-card
      [paymentMethods]="dashboardData?.payments ?? null"
      [loading]="loading"
    ></app-payment-methods-card>
  </div>

  <!-- Row 2: Popular Items (compact) + Total Orders (large) -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
    <app-popular-items-card
      [items]="dashboardData?.popular_items ?? null"
      [loading]="loading"
    ></app-popular-items-card>
    <div class="lg:col-span-2">
      <app-total-orders-card
        [ordersData]="dashboardData?.orders ?? null"
        [dateRange]="(dashboardService.dateRange$ | async) ?? 'day'"
        [loading]="loading"
      ></app-total-orders-card>
    </div>
  </div>

  <!-- Row 3: Tables (compact) + KDS Attention (large) -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
    <app-tables-card
      [tablesData]="dashboardData?.tables ?? null"
      [loading]="loading"
    ></app-tables-card>
    <div class="lg:col-span-2">
      <app-kds-attention-card
        [kdsData]="dashboardData?.kds ?? null"
        [loading]="loading"
      ></app-kds-attention-card>
    </div>
  </div>

  <!-- Row 4: Reviews (full width) -->
  <app-card-skeleton variant="wide"></app-card-skeleton>
</div>
