<div class="flex h-screen bg-background">
  <div *ngIf="sidebarOpen" class="fixed inset-0 bg-black/50 z-40 lg:hidden" (click)="sidebarOpen = false"></div>
  <app-sidebar [isOpen]="sidebarOpen" (sidebarToggle)="sidebarOpen = !sidebarOpen"></app-sidebar>
  <div class="flex-1 flex flex-col min-w-0 min-h-0">
    <app-top-nav (menuClick)="sidebarOpen = !sidebarOpen" (logoutClick)="logout()"></app-top-nav>
    <main class="flex-1 overflow-y-auto p-3 sm:p-4 md:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
