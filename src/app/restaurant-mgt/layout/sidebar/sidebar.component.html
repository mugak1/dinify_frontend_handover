<!-- Desktop sidebar -->
<div class="hidden lg:flex h-full">
  <aside class="flex flex-col h-full bg-sidebar border-r border-sidebar-border transition-all duration-300"
         [style.width.px]="collapsed ? 64 : 220">

    <!-- Logo header -->
    <div class="flex items-center justify-between h-16 px-3 border-b border-sidebar-border">
      <a routerLink="/rest-app/dashboard" class="flex items-center overflow-hidden">
        <svg height="20" class="fill-current text-sidebar-foreground shrink-0" viewBox="0 0 152 122">
          <path class="text-d-red fill-current" d="M141.49,24.44a48.39,48.39,0,0,0-4-4.54A49.17,49.17,0,0,0,102.58,5.45H0L24.16,33.92a28.18,28.18,0,0,0,20.22,9.92l14.5.66a5.92,5.92,0,0,0,5.72-3.63,17.56,17.56,0,0,1,.82-1.73c3.44-5.86,10-9.68,20.93-9.68,18,0,41,10.29,41,23s-23,23-41,23c-10.17,0-16.55-3.31-20.16-8.48a18.16,18.16,0,0,1-1.72-3A6,6,0,0,0,58.8,60.4l-11.73.53,5.12,6,18,21.82a42,42,0,0,0,32.43,15.31A49.33,49.33,0,0,0,151.29,62.6a50.42,50.42,0,0,0,.62-7.82,49.15,49.15,0,0,0-10.42-30.34"/>

      </a>
      <button (click)="toggleCollapse()" class="p-1 rounded-md hover:bg-sidebar-accent text-sidebar-foreground">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path *ngIf="!collapsed" d="m15 18-6-6 6-6"/>
          <path *ngIf="collapsed" d="m9 18 6-6-6-6"/>
        </svg>
      </button>
    </div>

    <!-- Nav items -->
    <nav class="flex-1 py-3 overflow-y-auto no-scrollbar" [class.px-2]="collapsed" [class.px-3]="!collapsed">
      <!-- Dashboard -->
      <a routerLink="/rest-app/dashboard" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [title]="collapsed ? 'Dashboard' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
        </svg>
        <span *ngIf="!collapsed" class="text-sm truncate">Dashboard</span>
      </a>

      <!-- Menu -->
      <a routerLink="/rest-app/menu" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"

        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </svg>

      <!-- Orders -->
      <a routerLink="/rest-app/orders" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [title]="collapsed ? 'Orders' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 18v-1"/><path d="M14 18v-3"/><path d="M18 18v-5"/>

         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [title]="collapsed ? 'Tables' : ''">

        </svg>

      </a>

      <!-- Reviews -->

         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [title]="collapsed ? 'Reviews' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a.53.53 0 0 0 .4.29l5.16.752a.53.53 0 0 1 .294.904l-3.733 3.638a.53.53 0 0 0-.152.469l.882 5.14a.53.53 0 0 1-.77.56l-4.613-2.426a.53.53 0 0 0-.494 0l-4.614 2.426a.53.53 0 0 1-.769-.56l.881-5.14a.53.53 0 0 0-.152-.47L3.36 8.92a.53.53 0 0 1 .294-.905l5.16-.751a.53.53 0 0 0 .4-.29z"/>

        </svg>
        <span *ngIf="!collapsed" class="text-sm truncate">Reports</span>
      </a>

      <!-- Payments -->
      <a routerLink="/rest-app/payments" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [title]="collapsed ? 'Payments' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </svg>

        </svg>
        <span *ngIf="!collapsed" class="text-sm truncate">Settings</span>
      </a>
    </nav>
  </aside>
</div>
