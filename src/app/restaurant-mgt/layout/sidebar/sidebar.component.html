<!-- Desktop sidebar -->
<aside
  class="hidden lg:flex flex-col bg-sidebar border-r border-sidebar-border transition-all duration-300 relative"
  [class.w-[220px]]="!collapsed"
  [class.w-[64px]]="collapsed"
  [style.width]="collapsed ? '64px' : '220px'"
>
  <!-- Logo header -->
  <div class="flex items-center h-16 px-3 border-b border-sidebar-border">
    <a routerLink="/rest-app/dashboard" class="flex items-center gap-2 overflow-hidden">
      <svg *ngIf="!collapsed" height="20" class="fill-current text-sidebar-foreground shrink-0" viewBox="0 0 495.95 121.55">

      <!-- Collapsed: D mark only -->
      <svg *ngIf="collapsed" height="28" class="fill-current text-sidebar-foreground shrink-0" viewBox="0 0 152 122">
        <path class="text-d-red fill-current" d="M141.49,24.44a48.39,48.39,0,0,0-4-4.54A49.17,49.17,0,0,0,102.58,5.45H0L24.16,33.92a28.18,28.18,0,0,0,20.22,9.92l14.5.66a5.92,5.92,0,0,0,5.72-3.63,17.56,17.56,0,0,1,.82-1.73c3.44-5.86,10-9.68,20.93-9.68,18,0,41,10.29,41,23s-23,23-41,23c-10.17,0-16.55-3.31-20.16-8.48a18.16,18.16,0,0,1-1.72-3A6,6,0,0,0,58.8,60.4l-11.73.53,5.12,6,18,21.82a42,42,0,0,0,32.43,15.31A49.33,49.33,0,0,0,151.29,62.6a50.42,50.42,0,0,0,.62-7.82,49.15,49.15,0,0,0-10.42-30.34"/>
      </svg>
    </a>
  </div>

  <!-- Nav items -->
  <nav class="flex-1 py-3 px-2 space-y-1 overflow-y-auto no-scrollbar">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
      class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
      [title]="collapsed ? item.label : ''"
    >
      <lucide-icon [name]="item.icon" [size]="20" class="shrink-0"></lucide-icon>
      <span *ngIf="!collapsed" class="text-sm truncate">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Collapse toggle button -->
  <button
    (click)="toggleCollapse()"
    class="absolute -right-3 top-20 w-6 h-6 bg-card border border-sidebar-border rounded-full flex items-center justify-center shadow-sm hover:bg-sidebar-accent transition-colors z-10"
  >
    <lucide-icon [name]="collapsed ? 'chevron-right' : 'chevron-left'" [size]="14"></lucide-icon>
  </button>
</aside>
