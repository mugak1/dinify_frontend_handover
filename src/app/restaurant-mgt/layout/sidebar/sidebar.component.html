<!-- Wrapper div: relative for toggle button positioning -->
<div class="relative flex-none fixed lg:relative inset-y-0 left-0 z-50"
     [ngClass]="{ 'hidden lg:block': !isOpen }">

  <aside class="bg-sidebar text-sidebar-foreground flex flex-col h-full transition-all duration-300 border-r border-sidebar-border"
         [style.width.px]="isOpen ? 220 : 64">

    <!-- Logo header -->
    <div class="flex items-center h-16 px-4 border-b border-sidebar-border"
         [ngClass]="{ 'justify-center': !isOpen }">
      <!-- Expanded: full logo (emblem + wordmark) -->
      <a *ngIf="isOpen" routerLink="/rest-app/dashboard" class="flex items-center overflow-hidden">
        <img src="assets/images/dinify-logo-full.svg" alt="Dinify" class="h-8 w-auto max-w-[140px]" />
      </a>
      <!-- Collapsed: emblem only -->
      <a *ngIf="!isOpen" routerLink="/rest-app/dashboard" class="flex items-center justify-center w-full">
        <img src="assets/images/dinify-emblem.svg" alt="Dinify" class="h-8 w-8" />
      </a>
    </div>

    <!-- Nav items -->
    <nav class="flex-1 py-5 px-4 space-y-2 overflow-y-auto no-scrollbar">
      <!-- Dashboard -->
      <a routerLink="/rest-app/dashboard" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Dashboard' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Dashboard</span>
      </a>

      <!-- Menu -->
      <a routerLink="/rest-app/menu" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Menu' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Menu</span>
      </a>

      <!-- Orders -->
      <a routerLink="/rest-app/orders" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Orders' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 18v-1"/><path d="M14 18v-3"/><path d="M18 18v-5"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Orders</span>
      </a>

      <!-- Tables -->
      <a routerLink="/rest-app/dining-tables" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Tables' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Tables</span>
      </a>

      <!-- Reviews -->
      <a routerLink="/rest-app/reviews" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Reviews' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a.53.53 0 0 0 .4.29l5.16.752a.53.53 0 0 1 .294.904l-3.733 3.638a.53.53 0 0 0-.152.469l.882 5.14a.53.53 0 0 1-.77.56l-4.613-2.426a.53.53 0 0 0-.494 0l-4.614 2.426a.53.53 0 0 1-.769-.56l.881-5.14a.53.53 0 0 0-.152-.47L3.36 8.92a.53.53 0 0 1 .294-.905l5.16-.751a.53.53 0 0 0 .4-.29z"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Reviews</span>
      </a>

      <!-- Reports -->
      <a routerLink="/rest-app/reports" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Reports' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 18v-2"/><path d="M12 18v-4"/><path d="M16 18v-6"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Reports</span>
      </a>

      <!-- Payments -->
      <a routerLink="/rest-app/payments" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Payments' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Payments</span>
      </a>

      <!-- Support -->
      <a routerLink="/rest-app/support" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Support' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Support</span>
      </a>

      <!-- Settings -->
      <a routerLink="/rest-app/settings" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [class.justify-center]="!isOpen" [title]="!isOpen ? 'Settings' : ''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="text-sm truncate" [class.hidden]="!isOpen">Settings</span>
      </a>
    </nav>
  </aside>

  <!-- Toggle button: OUTSIDE aside, INSIDE wrapper -->
  <button (click)="sidebarToggle.emit()"
          class="absolute top-5 -right-3 z-10 bg-white ring-1 ring-black/10 rounded-full w-6 h-6 hover:bg-gray-50 text-sidebar-foreground shadow-lg hidden lg:flex items-center justify-center">
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path [attr.d]="isOpen ? 'm11 17-5-5 5-5' : 'm6 17 5-5-5-5'"/>
      <path [attr.d]="isOpen ? 'm18 17-5-5 5-5' : 'm13 17 5-5-5-5'"/>
    </svg>
  </button>

</div>
