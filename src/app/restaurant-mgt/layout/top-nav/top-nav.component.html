<header class="sticky top-0 z-30 flex items-center justify-between h-14 px-4 bg-card border-b border-border">
  <!-- Left: hamburger (mobile only) -->
  <button (click)="menuClick.emit()" class="lg:hidden p-2 -ml-2 rounded-md hover:bg-accent transition-colors">
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
  </button>

  <!-- Spacer / optional content projection for page-specific controls -->
  <div class="flex-1 flex items-center">
    <ng-content></ng-content>
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-3">
    <!-- Restaurant name + logo -->
    <div *ngIf="auth.currentRestaurantRole?.restaurant_id" class="hidden sm:flex items-center gap-2 mr-2">
      <img
        *ngIf="auth.currentRestaurant?.logo"
        class="w-8 h-8 rounded-full border border-border object-cover"
        [src]="baseUrl + auth.currentRestaurant.logo"
        [alt]="auth.currentRestaurant.name"
      >
      <span class="text-sm font-medium text-foreground truncate max-w-[160px]">
        {{ auth.currentRestaurantRole.restaurant }}
      </span>
    </div>

    <!-- Notifications -->
    <a
      routerLink="/rest-app/notifications"
      class="p-2 rounded-md hover:bg-accent transition-colors text-muted-foreground hover:text-foreground"
    >
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    </a>

    <!-- Logout -->
    <button (click)="logoutClick.emit()" class="p-2 rounded-md hover:bg-accent transition-colors text-muted-foreground hover:text-foreground" title="Logout">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
    </button>
  </div>
</header>
