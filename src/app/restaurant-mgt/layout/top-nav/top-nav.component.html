<header class="sticky top-0 z-30 flex items-center justify-between h-14 px-4 bg-card border-b border-border">
  <!-- Left: hamburger (mobile only) -->
  <button (click)="menuClick.emit()" class="lg:hidden p-2 -ml-2 rounded-md hover:bg-accent transition-colors">
    <lucide-icon name="menu" [size]="20"></lucide-icon>
  </button>

  <!-- Spacer / optional content projection for page-specific controls -->
  <div class="flex-1 flex items-center">
    <ng-content></ng-content>
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-3">
    <!-- Restaurant name + logo -->
    <div *ngIf="auth.currentRestaurantRole?.restaurant_id" class="hidden sm:flex items-center gap-2 mr-2">
      <img
        *ngIf="auth.currentRestaurant?.logo"
        class="w-8 h-8 rounded-full border border-border object-cover"
        [src]="baseUrl + auth.currentRestaurant.logo"
        [alt]="auth.currentRestaurant.name"
      >
      <span class="text-sm font-medium text-foreground truncate max-w-[160px]">
        {{ auth.currentRestaurantRole.restaurant }}
      </span>
    </div>

    <!-- Notifications -->
    <a
      routerLink="/rest-app/notifications"
      class="p-2 rounded-md hover:bg-accent transition-colors text-muted-foreground hover:text-foreground"
    >
      <lucide-icon name="bell" [size]="20"></lucide-icon>
    </a>
  </div>
</header>
