<img
  #imageElement
  *ngIf="!container"
  [class]="imgclass"
  [style]="'height:{{height}}'"
  [src]="(url + src)"
  width="{{width}}"
  height="{{height}}"
  [alt]="alt"
  [attr.loading]="'lazy'">
<div
  *ngIf="container"
  [class]="imgclass"
  class="img-container"
  [style.height.px]="height"
  [style.width.px]="width">
  <img
    #imageElementContainer
    class="img"
    [src]="(url + src)"
    [alt]="alt"
    [attr.loading]="'lazy'"><!-- loaded ? (url + src) : 'placeholder-image-path.jpg'" -->
