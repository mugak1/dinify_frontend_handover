<div #ConfirmDialog class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true" tabindex="0" 
id="confirm-modal-content"
(keydown)="handleKeyDown($event)">
    <!--
      Background backdrop, show/hide based on modal state.
  
      Entering: "ease-out duration-300"
        From: "opacity-0"
        To: "opacity-100"
      Leaving: "ease-in duration-200"
        From: "opacity-100"
        To: "opacity-0"
    -->
    <div class="fixed inset-0 bg-black bg-opacity-60 transition-opacity"></div>
  
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="h-screen flex justify-center items-center p-4 text-center my-auto sm:items-center sm:p-0">

        <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-auto sm:w-full sm:max-w-lg">
          <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
            <div class="sm:flex sm:items-start">
              <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-red-100 sm:mx-0 sm:h-10 sm:w-10">
                <svg class="h-6 w-6 text-d-red" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" >
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                </svg>
              </div>
              <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
                <h3 class="text-base font-semibold leading-6 text-gray-900" id="modal-title">{{data?.title}}</h3>
                <button *ngIf="has_reason" type="button" (click)="Cancel()" class="fixed text-gray-400  hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center top-0 right-0">
                  <svg class="w-3 h-3"  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                  </svg>
                  <span class="sr-only">Close modal</span>
              </button>
                <div class="mt-2 flex flex-row">
                  <span *ngIf="data?.reason_required" class="text-d-red">*</span>
                  <p class="text-sm text-gray-500" [innerHTML]="data?.message"></p>                  
                </div>
              </div>
              
            </div>
            <div *ngIf="has_reason" class="mt-3">
                <textarea type="text"  [(ngModel)]="reason" [ngClass]="{'border-d-red border-2':!reason,' border-gray-300': reason}" class="bg-gray-50 border placeholder:text-xs text-gray-900 sm:text-sm rounded block w-full p-2.5 " placeholder="Enter the reason" required="required"></textarea>
              </div>
          </div>
          <div class="w-100 bg-gray-100 text-gray-500 text-xs p-4" *ngIf="data?.action_info">
            {{data?.action_info}}
          </div>
          <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
            <button type="button" (click)="toggleModal()" class="inline-flex w-full justify-center rounded-md bg-d-red px-6 py-2 text-sm font-semibold text-white shadow-sm hover:opacity-75 sm:ml-3 sm:w-auto">{{(data?.submitButtonText? data?.submitButtonText: (has_reason?'Approve':'OK'))|titlecase}}</button>
            <button type="button" (click)="has_reason?Reject():Cancel()" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:opacity-75 sm:mt-0 sm:w-auto">{{(data?.cancelButtonText? data?.cancelButtonText:(has_reason?'Reject':'Cancel'))|titlecase}}</button>
          </div>
        </div>
      </div>
    </div>
  </div>
