<div class="flex flex-row items-center justify-between mx-auto w-full max-w-xs space-x-1">
      <div  *ngFor="let input of inputs.controls; let i = index" class="w-16 h-16 ">
<input class="shadow-xs flex w-[64px] items-center justify-center rounded-lg border border-stroke bg-white p-2 text-center text-2xl font-medium text-gray-5 outline-none sm:text-4xl dark:border-dark-3 dark:bg-white/5"
  #inputEl
  (focus)="handleFocus($event)"
  (blur)="onTouched?.()"
  (keypress)="handleKeyPress($event, i)"
  (input)="handleInput()"
  (keydown)="handleKeyDown($event, i)"
  (paste)="handlePaste($event, i)"
  [formControl]="$any(input)"
  [attr.autocomplete]="i === 0 ? 'one-time-code' : null"
  type="text"
  inputmode="numeric"
/>
</div>
</div>
